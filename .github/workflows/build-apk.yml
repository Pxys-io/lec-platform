name: Build LEC Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Main server API URL'
        required: false
        default: 'https://main.lec.pxysio.top/api/v1'
      video_url:
        description: 'Video server public URL'
        required: false
        default: 'https://video.lec.pxysio.top'
      video_stream_url:
        description: 'Video stream base URL'
        required: false
        default: 'https://video.lec.pxysio.top'
      encryption_key:
        description: 'AES-256 encryption key (32 chars)'
        required: false
        default: 'my_32_char_super_secret_key_!!!!'
      variant:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk \
            --${{ github.event.inputs.variant || 'release' }} \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_url || 'https://main.lec.pxysio.top/api/v1' }} \
            --dart-define=VIDEO_SERVER_URL=${{ github.event.inputs.video_url || 'https://video.lec.pxysio.top' }} \
            --dart-define=VIDEO_STREAM_URL=${{ github.event.inputs.video_stream_url || 'https://video.lec.pxysio.top' }} \
            --dart-define=ENCRYPTION_KEY=${{ github.event.inputs.encryption_key || 'my_32_char_super_secret_key_!!!!' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lec-${{ github.event.inputs.variant || 'release' }}-apk
          path: agent/build/app/outputs/flutter-apk/app-*.apk
          if-no-files-found: warn
